<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodemy</title>

    <!-- Google Fonts: Almendra + Almendra Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Almendra+Display&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Full-screen dark overlay (above background, below UI) -->
    <div id="overlay"></div>

    <!-- Bottom gradient fade -->
    <div id="bottom-gradient"></div>

    <div id="title-label">Pomodemy</div>
    <!-- Timer HUD (top right) -->
    <div id="hud">
      <div id="hud-progress-bar-track">
        <div id="hud-progress-bar"></div>
      </div>
      <div id="hud-countdown">25:00</div>
      <div id="hud-phase">Pomodoro 1</div>
      <div id="hud-controls">
        <button id="btn-play">Play</button>
        <button id="btn-skip">Skip</button>
        <button id="btn-reset" class="hex-btn">Reset all</button>
      </div>
    </div>

    <!-- Bottom bar -->
    <div id="bottom-bar">
      <div id="url-input-group">
        <label for="youtube-url" id="url-label">YouTube URL</label>
        <div id="url-input-row">
          <input type="text" id="youtube-url" autocomplete="off" spellcheck="false" />
          <span id="url-check" class="hidden">✓</span>
        </div>
        <div id="url-error" class="url-helper hidden"></div>
      </div>
      <div id="volume-group">
        <button id="volume-icon" aria-label="Volume" aria-expanded="false" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
        <input type="range" id="volume-slider" min="0" max="100" value="80" />
        <div id="volume-popup" class="hidden">
          <div id="vol-slider-wrap">
            <input type="range" id="volume-slider-popup" min="0" max="100" value="80" aria-label="Volume" />
          </div>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
        </div>
      </div>
      <div id="credit-label">
        Created by Brightperegrine
        <a href="https://bsky.app/profile/brightperegrine.bsky.social" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Bluesky profile">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="currentColor">
            <path d="M180 142c-16.3-31.7-60.7-90.8-102-120C38 2 0 20 0 61.5 0 72 2.7 166.3 14 192c21.5 52.6 81.5 71.2 140.3 65.7C100 268 48 306.7 48 340c0 0 0 0 0 0 132 0 132-80 132-80s0 80 132 80c0 0 0 0 0 0 0-33.3-52-72-106.3-82.3C264.5 263.2 324.5 244.6 346 192c11.3-25.7 14-120 14-130.5C360 20 322 2 282 22c-41.3 29.2-85.7 88.3-102 120z"/>
          </svg>
        </a>
        <a href="https://github.com/Brightperegrine" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="GitHub profile">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Hidden YouTube player container (required by YouTube IFrame API) -->
    <div id="youtube-container" style="display: none;">
      <div id="youtube-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
